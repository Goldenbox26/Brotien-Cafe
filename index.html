<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BROTien Cafe | Fuel Your Mood</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">

<div class="hero-overlay"></div>

<div class="hero-content">

<span class="tag">Healthy • Fresh • Delicious</span>

<h1>BROTIEN CAFE</h1>

<h2>Fuel Your Mood</h2>

<p>
Wholesome meals, comforting favorites, and protein-packed goodness.
</p>

<div class="hero-buttons">
<button class="btn primary" onclick="scrollToMenu()">Dine-In</button>
<button class="btn secondary" onclick="scrollToMenu()">Order Online</button>
</div>

</div>

</header>

<section class="category-section">
<h2>Healthy Choices</h2>

<div class="food-grid" id="healthyMenu"></div>
</section>

<section class="category-section">
<h2>Comfort Cravings</h2>

<div class="food-grid" id="comfortMenu"></div>
</section>

<!-- Floating Cart -->

<div class="floating-cart" id="floatingCart" onclick="openCheckout()">
🛒 <span id="cartCount">0</span>
</div>

<!-- Nutrition Modal -->

<div class="modal" id="nutritionModal">

<div class="modal-content">

<span class="close" onclick="closeNutrition()">&times;</span>

<h2 id="nutritionTitle"></h2>

<div id="nutritionBody"></div>

</div>

</div>

<!-- Checkout Modal -->

<div class="modal" id="checkoutModal">

<div class="modal-content checkout">

<span class="close" onclick="closeCheckout()">&times;</span>

<h2>Your Order</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="totalPrice">0</span>
</div>

<form id="checkoutForm">

<input
type="text"
id="customerName"
placeholder="Your Name"
required
>

<input
type="tel"
id="customerPhone"
placeholder="Phone Number"
required
>

<select id="orderType">
<option value="Dine-In">Dine-In</option>
<option value="Delivery">Online Delivery</option>
</select>

<textarea
id="customerAddress"
placeholder="Delivery Address"
></textarea>

<button type="submit" class="btn primary full">
Proceed to WhatsApp
</button>

</form>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
